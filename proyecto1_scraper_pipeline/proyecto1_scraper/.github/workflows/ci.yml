name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * *"   # Ejecuta el scraper todos los días a las 8am UTC

jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint con flake8
        run: |
          flake8 src/ --max-line-length=100 --ignore=E501,W503

      - name: Ejecutar tests con cobertura
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing --cov-fail-under=70

  run-pipeline:
    name: Ejecutar pipeline diario
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'schedule' || github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr pipeline
        run: |
          cd src
          python main.py

      - name: Subir artefactos (datos generados)
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output
          path: data/
          retention-days: 7
