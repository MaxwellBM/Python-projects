name: Dashboard CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 httpx

      - name: Lint con flake8
        run: flake8 src/ --max-line-length=100 --ignore=E501,W503

      - name: Tests con cobertura
        run: pytest tests/ -v --cov=src --cov-report=term-missing --cov-fail-under=75

      - name: Publicar reporte de cobertura
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  deploy-api:
    name: Deploy API → Render
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger deploy en Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            --fail
        # Configura RENDER_DEPLOY_HOOK_URL en GitHub Secrets
        # Lo obtienes en: Render Dashboard → Service → Settings → Deploy Hook

  notify:
    name: Notificar resultado
    runs-on: ubuntu-latest
    needs: [test, deploy-api]
    if: always()

    steps:
      - name: Resumen
        run: |
          echo "Tests: ${{ needs.test.result }}"
          echo "Deploy: ${{ needs.deploy-api.result }}"
